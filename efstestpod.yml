apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-efs
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-efs
  template:
    metadata:
      labels:
        app: nginx-efs
    spec:
      containers:
      - name: nginx
        image: nginx
        volumeMounts:
        - mountPath: /data
          name: efs-vol
      volumes:
      - name: efs-vol
        persistentVolumeClaim:
          claimName: efs-pvc
